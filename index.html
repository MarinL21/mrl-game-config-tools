<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏运营策划工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
        }

        .modules {
            padding: 40px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .module-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 35px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .module-icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .module-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .module-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .footer {
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .modules {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 游戏运营策划工具</h1>
            <p>快速配置游戏奖励与掉落</p>
        </div>

        <div class="modules">
            <a href="礼包配置工具.html" class="module-card">
                <div class="module-icon">🎁</div>
                <div class="module-title">奖励配置工具</div>
                <div class="module-desc">快速配置礼包奖励JSON，支持自定义物品和固定配置</div>
            </a>

            <a href="掉落配置工具.html" class="module-card">
                <div class="module-icon">🎲</div>
                <div class="module-title">掉落配置工具</div>
                <div class="module-desc">配置随机掉落奖励，支持设置权重和抽取次数</div>
            </a>
        </div>

        <div class="footer">
            © 2026 游戏运营策划工具
        </div>
    </div>
</body>
</html>
